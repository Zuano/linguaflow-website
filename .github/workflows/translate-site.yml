name: Translate Site (DeepL)

# Triggert nur wenn sich eine deutsche Quell-HTML-Datei ändert
# oder manuell über "Run workflow"

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'hilfe.html'
      - 'datenschutz.html'
      - 'eula.html'
      - 'impressum.html'
      - 'scripts/translate-site.py'
  workflow_dispatch:
    inputs:
      force:
        description: 'Alle Sprachen neu übersetzen (Cache ignorieren)?'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run DeepL translation
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python scripts/translate-site.py --force
          else
            python scripts/translate-site.py
          fi

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Keine Änderungen an den Übersetzungen."
          else
            git commit -m "auto: Aktualisierte Übersetzungen (DeepL)"
            git push
          fi
