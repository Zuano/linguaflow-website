name: Update App Store Ratings

# Läuft täglich um 04:00 UTC (06:00 Wien-Zeit im Sommer, 05:00 im Winter)
# und kann auch manuell über den Actions-Tab ausgelöst werden.
# Runs daily at 04:00 UTC, can also be triggered manually.

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:  # Manueller Trigger über GitHub UI

permissions:
  contents: write  # Erlaubt dem Bot, Änderungen zu committen

# Zwingt JavaScript-Actions auf Node.js 24 (ab Juni 2026 Default)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Update ratings in index.html
        run: python scripts/update-ratings.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "Keine Änderung an den Ratings – nichts zu committen."
          else
            git commit -m "auto: Update App Store ratings (aggregateRating)"
            git push
          fi
